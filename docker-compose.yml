services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      RAG_EVAL_GOV_MODE: local
      PYTHONUNBUFFERED: "1"

  dashboard:
    build: .
    command: ["python", "-m", "http.server", "8080", "--directory", "/app/dashboard"]
    ports:
      - "8080:8080"
    environment:
      RAG_EVAL_GOV_MODE: local
    depends_on:
      - api
