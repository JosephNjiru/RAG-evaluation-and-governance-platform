risks:
- risk_id: RISK-001
  risk_name: unsupported answer
  description: Answer contains material claims not supported by evidence.
  severity: high
  detection_signals:
  - rubric score below threshold
  - failed deterministic validation
  mitigation_controls:
  - refusal rule
  - citation check
  - human review queue
