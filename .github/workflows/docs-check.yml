name: Docs check

on:
  push:
  pull_request:

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: python -m uv sync

      - name: Build dashboard
        run: python -m uv run python scripts/build_evaluation_dashboard.py

      - name: Check Markdown links
        run: python -m uv run python scripts/check_markdown_links.py

      - name: Run quality scan
        run: python -m uv run python scripts/quality_scan.py
